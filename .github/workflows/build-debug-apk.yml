name: Build Debug APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Uses a Gradle install provisioned by this action (not this repo's
      # gradlew/gradle-wrapper.jar), so a CI build never depends on the
      # wrapper jar being valid on whatever machine wrote it.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: product-photo-ai-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
