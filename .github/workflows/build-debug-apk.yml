name: Build Debug APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      backend_url:
        description: >
          Backend base URL to bake into this build (e.g. http://<your-computer's-LAN-IP>:8000/
          for a real phone on the same WiFi, or your own hosted URL). Leave blank to use the
          default (the hosted Render.com deployment, which works out of the box on a real
          phone with no setup).
        required: false
        default: ""

permissions:
  contents: write # needed to publish the GitHub Release below

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Uses a Gradle install provisioned by this action (not this repo's
      # gradlew/gradle-wrapper.jar), so a CI build never depends on the
      # wrapper jar being valid on whatever machine wrote it.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: |
          if [ -n "${{ inputs.backend_url }}" ]; then
            gradle assembleDebug --no-daemon -PbackendUrl="${{ inputs.backend_url }}"
          else
            gradle assembleDebug --no-daemon
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: product-photo-ai-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # Only for the real main-branch build (not PRs, not one-off manual
      # backend_url builds) -- publishes/updates a single rolling "latest"
      # GitHub Release with the APK attached, so there's a permanent,
      # bookmarkable download link instead of a workflow artifact that
      # expires in 14 days and requires being logged in to fetch.
      - name: Publish latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug build
          prerelease: true
          make_latest: true
          body: >
            Automatically built from the latest commit on `main`
            (${{ github.sha }}). Talks to the hosted Render.com backend by
            default, so both Background Removal and Upscale work out of the
            box on a real phone -- unless rebuilt with a custom `backend_url`
            via workflow_dispatch. Not a signed Play Store release.
          files: app/build/outputs/apk/debug/app-debug.apk
