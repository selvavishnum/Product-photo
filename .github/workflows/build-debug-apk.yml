name: Build Debug APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      backend_url:
        description: >
          Backend base URL to bake into this build (e.g. http://<your-computer's-LAN-IP>:8000/
          for a real phone on the same WiFi, or a public HTTPS URL). Leave blank to use the
          default (http://10.0.2.2:8000/, which only works on the Android emulator).
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Uses a Gradle install provisioned by this action (not this repo's
      # gradlew/gradle-wrapper.jar), so a CI build never depends on the
      # wrapper jar being valid on whatever machine wrote it.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: |
          if [ -n "${{ inputs.backend_url }}" ]; then
            gradle assembleDebug --no-daemon -PbackendUrl="${{ inputs.backend_url }}"
          else
            gradle assembleDebug --no-daemon
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: product-photo-ai-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
