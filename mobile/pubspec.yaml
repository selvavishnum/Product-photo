name: product_photo_studio
description: AI-driven e-commerce product photography studio.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  image_picker: ^1.1.2
  # Full photo editor (crop/rotate, filters, tune, paint, text, stickers).
  # Version + API verified against the real package source downloaded from
  # pub.dev (reachable from this sandbox, unlike most registries).
  pro_image_editor: ^13.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
